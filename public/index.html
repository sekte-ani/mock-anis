<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock Admin — A.N.I Tech</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5f4f0;
        --surface: #ffffff;
        --border: #e2e0d8;
        --border-focus: #1a1a1a;
        --accent: #1a1a1a;
        --accent2: #e85d2f;
        --text: #1a1a1a;
        --text-dim: #888;
        --text-muted: #bbb;
        --success: #2d8a4e;
        --error: #cc3333;
        --radius: 10px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        padding: 40px 24px;
      }

      .container {
        max-width: 680px;
        margin: 0 auto;
      }

      .header {
        margin-bottom: 32px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }

      .brand-dot {
        width: 10px;
        height: 10px;
        background: var(--accent2);
        border-radius: 50%;
      }

      .brand-name {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-dim);
        font-family: "DM Mono", monospace;
      }

      .header h1 {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .header p {
        font-size: 14px;
        color: var(--text-dim);
        margin-top: 6px;
        font-family: "DM Mono", monospace;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 28px;
        margin-bottom: 16px;
      }

      .card-title {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-dim);
        font-family: "DM Mono", monospace;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .card-title::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .field {
        margin-bottom: 18px;
      }
      .field:last-child {
        margin-bottom: 0;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      label span {
        color: var(--accent2);
      }

      input[type="text"],
      textarea,
      select {
        width: 100%;
        background: var(--bg);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        padding: 10px 14px;
        outline: none;
        transition: border-color 0.15s;
        appearance: none;
      }

      input[type="text"]:focus,
      textarea:focus,
      select:focus {
        border-color: var(--border-focus);
      }

      textarea {
        resize: vertical;
        min-height: 80px;
        line-height: 1.6;
      }

      .select-wrapper {
        position: relative;
      }
      .select-wrapper::after {
        content: "↓";
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 12px;
        color: var(--text-dim);
        pointer-events: none;
        font-family: "DM Mono", monospace;
      }

      .field-hint {
        font-size: 12px;
        color: var(--text-dim);
        margin-top: 5px;
        font-family: "DM Mono", monospace;
      }

      .upload-zone {
        border: 2px dashed var(--border);
        border-radius: var(--radius);
        padding: 32px 20px;
        text-align: center;
        cursor: pointer;
        transition: all 0.15s;
        position: relative;
        background: var(--bg);
      }

      .upload-zone:hover,
      .upload-zone.dragover {
        border-color: var(--accent);
        background: #f0efeb;
      }

      .upload-zone input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }

      .upload-icon {
        font-size: 28px;
        margin-bottom: 8px;
      }
      .upload-text {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .upload-subtext {
        font-size: 12px;
        color: var(--text-dim);
        font-family: "DM Mono", monospace;
      }

      .preview-wrapper {
        display: none;
        margin-top: 12px;
      }
      .preview-wrapper.show {
        display: block;
      }

      .preview-img {
        width: 100%;
        max-height: 200px;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid var(--border);
      }

      .preview-info {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 8px;
      }

      .preview-name {
        font-size: 12px;
        font-family: "DM Mono", monospace;
        color: var(--text-dim);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 400px;
      }

      .remove-btn {
        font-size: 11px;
        color: var(--error);
        background: none;
        border: none;
        cursor: pointer;
        font-family: "DM Mono", monospace;
        flex-shrink: 0;
      }

      .submit-btn {
        width: 100%;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius);
        padding: 14px 24px;
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .submit-btn:hover {
        background: #333;
      }
      .submit-btn:disabled {
        background: var(--text-muted);
        cursor: not-allowed;
      }

      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        padding: 12px 18px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
        transform: translateY(80px);
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 999;
      }

      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }
      .toast.success {
        background: var(--success);
        color: #fff;
      }
      .toast.error {
        background: var(--error);
        color: #fff;
      }

      .log {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px 28px;
      }

      .log-title {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-dim);
        font-family: "DM Mono", monospace;
        margin-bottom: 14px;
      }

      .log-empty {
        font-size: 13px;
        color: var(--text-muted);
        font-family: "DM Mono", monospace;
        text-align: center;
        padding: 12px 0;
      }

      .log-item {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
        animation: fadeIn 0.2s ease;
      }

      .log-item:last-child {
        border-bottom: none;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .log-thumb {
        width: 44px;
        height: 44px;
        border-radius: 6px;
        object-fit: cover;
        border: 1px solid var(--border);
        flex-shrink: 0;
        background: var(--bg);
      }

      .log-info {
        flex: 1;
        min-width: 0;
      }

      .log-name {
        font-size: 13px;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .log-meta {
        font-size: 11px;
        color: var(--text-dim);
        font-family: "DM Mono", monospace;
        margin-top: 2px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .log-badge {
        font-size: 10px;
        font-family: "DM Mono", monospace;
        background: #eaf7ef;
        color: var(--success);
        border-radius: 4px;
        padding: 2px 7px;
        flex-shrink: 0;
        font-weight: 600;
      }

      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="brand">
          <div class="brand-dot"></div>
          <span class="brand-name">A.N.I Tech · Mock Admin</span>
        </div>
        <h1>Mockup Dataset Manager</h1>
      </div>

      <div class="card">
        <div class="card-title">Upload Gambar</div>
        <div class="field">
          <div class="upload-zone" id="upload-zone">
            <input type="file" id="file-input" accept="image/*" />
            <div class="upload-icon">🖼️</div>
            <div class="upload-text">Klik atau drag gambar ke sini</div>
            <div class="upload-subtext">PNG, JPG, WebP · Maks 5MB</div>
          </div>
          <div class="preview-wrapper" id="preview-wrapper">
            <img class="preview-img" id="preview-img" src="" alt="preview" />
            <div class="preview-info">
              <span class="preview-name" id="preview-name"></span>
              <button class="remove-btn" onclick="removeFile()">✕ Hapus</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Metadata</div>

        <div class="field">
          <label>Sektor <span>*</span></label>
          <div class="select-wrapper">
            <select id="sektor" onchange="generateId()">
              <option value="">Pilih sektor...</option>
              <option value="Kuliner">Kuliner & FnB</option>
              <option value="Perdagangan">Perdagangan</option>
              <option value="Kesehatan Kecantikan">Kesehatan Kecantikan</option>
              <option value="Pendidikan">Pendidikan</option>
              <option value="Jasa Profesional">Jasa Profesional</option>
              <option value="Pemerintah dan Sosial">
                Pemerintah dan Sosial
              </option>
              <option value="Keuangan">Keuangan</option>
              <option value="Logistik">Logistik</option>
              <option value="Kreatif dan Digital">Kreatif dan Digital</option>
              <option value="Gaya Hidup">Gaya Hidup</option>
              <option value="Agrikultur">Agrikultur</option>
              <option value="Otomotif">Otomotif</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>Mock ID <span>*</span></label>
          <input type="text" id="mock-id" placeholder="mkl001" readonly />
          <div class="field-hint">Auto-generate berdasarkan sektor</div>
        </div>

        <div class="field">
          <label>Nama Mock <span>*</span></label>
          <input
            type="text"
            id="nama-mock"
            placeholder="Landing Page Kuliner"
          />
        </div>

        <div class="field">
          <label>Keywords <span>*</span></label>
          <textarea
            id="keywords"
            placeholder="ayam goreng, makanan, resto, delivery, menu, order"
          ></textarea>
          <div class="field-hint">
            Pisahkan dengan koma. Makin banyak makin akurat matchingnya.
          </div>
        </div>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">
        <span id="btn-text">Upload & Simpan</span>
      </button>

      <div class="log" style="margin-top: 16px">
        <div class="log-title">Riwayat Upload</div>
        <div class="log-empty" id="log-empty">Belum ada upload</div>
        <div id="log-list"></div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      let selectedFile = null;
      const sektorCounters = {};

      const sektorPrefix = {
        Kuliner: "mkl",
        Perdagangan: "mpd",
        "Kesehatan Kecantikan": "mks",
        Pendidikan: "mpn",
        "Jasa Profesional": "mjs",
        "Pemerintah dan Sosial": "mpmt",
        Keuangan: "mkeu",
        Logistik: "mlg",
        "Kreatif dan Digital": "mkr",
        "Gaya Hidup": "mgl",
        Agrikultur: "mag",
        Otomotif: "mot",
      };

      // Drag & drop
      const zone = document.getElementById("upload-zone");
      zone.addEventListener("dragover", (e) => {
        e.preventDefault();
        zone.classList.add("dragover");
      });
      zone.addEventListener("dragleave", () =>
        zone.classList.remove("dragover"),
      );
      zone.addEventListener("drop", (e) => {
        e.preventDefault();
        zone.classList.remove("dragover");
        if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
      });

      document.getElementById("file-input").addEventListener("change", (e) => {
        if (e.target.files[0]) handleFile(e.target.files[0]);
      });

      function handleFile(file) {
        if (file.size > 5 * 1024 * 1024) {
          showToast("File terlalu besar. Maks 5MB.", "error");
          return;
        }
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById("preview-img").src = e.target.result;
          document.getElementById("preview-name").textContent = file.name;
          document.getElementById("preview-wrapper").classList.add("show");
        };
        reader.readAsDataURL(file);
      }

      function removeFile() {
        selectedFile = null;
        document.getElementById("preview-wrapper").classList.remove("show");
        document.getElementById("file-input").value = "";
      }

      function generateId() {
        const sektor = document.getElementById("sektor").value;
        if (!sektor) return;
        const prefix = sektorPrefix[sektor] || "mxx";
        if (!sektorCounters[sektor]) sektorCounters[sektor] = 1;
        document.getElementById("mock-id").value =
          `${prefix}${String(sektorCounters[sektor]).padStart(3, "0")}`;
      }

      function setLoading(loading) {
        const btn = document.getElementById("submit-btn");
        document.getElementById("btn-text").innerHTML = loading
          ? '<div class="spinner"></div> Memproses...'
          : "Upload & Simpan";
        btn.disabled = loading;
      }

      async function handleSubmit() {
        const mockId = document.getElementById("mock-id").value.trim();
        const nama = document.getElementById("nama-mock").value.trim();
        const sektor = document.getElementById("sektor").value;
        const keywords = document.getElementById("keywords").value.trim();

        if (!selectedFile) {
          showToast("Pilih gambar dulu!", "error");
          return;
        }
        if (!mockId || !nama || !sektor || !keywords) {
          showToast("Lengkapi semua field!", "error");
          return;
        }

        setLoading(true);

        try {
          const formData = new FormData();
          formData.append("image", selectedFile);
          formData.append("mock_id", mockId);
          formData.append("nama_mock", nama);
          formData.append("sektor", sektor);
          formData.append("keywords", keywords);

          const res = await fetch("/api/upload", {
            method: "POST",
            body: formData,
          });

          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Upload gagal");

          addLog({
            mockId,
            nama,
            sektor,
            imageURL: data.path_image,
            thumb: URL.createObjectURL(selectedFile),
          });

          sektorCounters[sektor] = (sektorCounters[sektor] || 1) + 1;
          resetForm();
          showToast(`✓ ${mockId} berhasil disimpan!`, "success");
        } catch (err) {
          showToast("Gagal: " + err.message, "error");
        }

        setLoading(false);
      }

      function resetForm() {
        document.getElementById("nama-mock").value = "";
        document.getElementById("keywords").value = "";
        removeFile();
        generateId();
      }

      function addLog({ mockId, nama, sektor, imageURL, thumb }) {
        document.getElementById("log-empty").style.display = "none";
        const item = document.createElement("div");
        item.className = "log-item";
        item.innerHTML = `
      <img class="log-thumb" src="${thumb}" alt="${nama}">
      <div class="log-info">
        <div class="log-name">${nama}</div>
        <div class="log-meta">${mockId} · ${sektor} · ${imageURL}</div>
      </div>
      <span class="log-badge">✓ saved</span>
    `;
        document.getElementById("log-list").prepend(item);
      }

      function showToast(msg, type = "success") {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = `toast ${type} show`;
        setTimeout(() => t.classList.remove("show"), 3000);
      }
    </script>
  </body>
</html>
